# Reusable Python Checks
# Called by each repo's pr-checks.yml
#
# Runs: pip install, ruff lint, ruff format check, bandit security scan
# Inputs: python-version, requirements-file, system-packages
#
# Auto-detects system packages for common Python C-extension dependencies:
#   mariadb     → libmariadb-dev
#   mysqlclient → default-libmysqlclient-dev
#   psycopg2    → libpq-dev

name: Python Checks

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version to use"
        type: string
        default: "3.12"
      requirements-file:
        description: "Space-separated list of requirements files"
        type: string
        default: "requirements.txt"
      system-packages:
        description: "Space-separated list of apt packages to install before pip (e.g. 'libmariadb-dev libpq-dev')"
        type: string
        default: ""

jobs:
  python-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auto-detect and install system packages
        run: |
          PKGS="${{ inputs.system-packages }}"

          # Map well-known Python packages to their required system libraries
          for req in ${{ inputs.requirements-file }}; do
            if [ -f "$req" ]; then
              grep -qi '^mariadb'      "$req" && PKGS="$PKGS libmariadb-dev"
              grep -qi '^mysqlclient'  "$req" && PKGS="$PKGS default-libmysqlclient-dev"
              grep -qi '^psycopg2[^-]' "$req" && PKGS="$PKGS libpq-dev"
            fi
          done

          # De-duplicate and install
          PKGS=$(echo "$PKGS" | tr ' ' '\n' | sort -u | tr '\n' ' ')
          if [ -n "$(echo "$PKGS" | tr -d ' ')" ]; then
            echo "Installing system packages: $PKGS"
            sudo apt-get update
            sudo apt-get install -y $PKGS
          fi

      - name: Set up Python ${{ inputs.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          for req in ${{ inputs.requirements-file }}; do
            if [ -f "$req" ]; then
              pip install -r "$req"
            else
              echo "⚠️  Requirements file not found: $req (skipping)"
            fi
          done
          pip install ruff bandit

      - name: Ruff lint
        run: ruff check . --output-format=github

      - name: Ruff format check
        run: ruff format --check .

      - name: Bandit security scan
        run: bandit -r . -x ./tests,./.venv -f json -o bandit-report.json || true

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 30
