# Reusable Ansible Checks
# Called by each repo's pr-checks.yml
#
# Runs: ansible-lint with configurable profile
# Inputs: profile

name: Ansible Checks

on:
  workflow_call:
    inputs:
      profile:
        description: "ansible-lint profile: min, basic, moderate, safety, shared, production"
        type: string
        default: "moderate"

jobs:
  ansible-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ansible-lint
        run: pip install ansible-lint

      - name: Run ansible-lint
        run: ansible-lint --profile ${{ inputs.profile }} --format pep8
