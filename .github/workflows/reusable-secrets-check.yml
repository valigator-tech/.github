# Reusable Secrets Detection
# Called by each repo's pr-checks.yml
#
# Runs: gitleaks to detect committed secrets/credentials
# No inputs required — always runs with default config

name: Secrets Check

on:
  workflow_call:

jobs:
  secrets-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for scanning

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}
