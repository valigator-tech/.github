# Reusable Secrets Detection
# Called by each repo's pr-checks.yml
#
# Runs: gitleaks CLI (open-source) to detect committed secrets/credentials
# Uses the CLI directly instead of gitleaks-action (which requires a paid
# license for organizations).
#
# No inputs required — always runs with default config

name: Secrets Check

on:
  workflow_call:

jobs:
  secrets-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for scanning

      - name: Install Gitleaks
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          GITLEAKS_VERSION=$(curl -sH "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/gitleaks/gitleaks/releases/latest \
            | grep '"tag_name"' | sed 's/.*"v\(.*\)".*/\1/')
          if [ -z "$GITLEAKS_VERSION" ]; then
            echo "::error::Failed to fetch latest gitleaks version (API rate limit?)"
            exit 1
          fi
          curl -sSLo gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: Run Gitleaks
        run: |
          gitleaks detect --source . --verbose --redact --report-format sarif --report-path gitleaks-report.sarif

      - name: Upload SARIF report
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gitleaks-report.sarif
        continue-on-error: true  # Don't fail if Code Security is not enabled
