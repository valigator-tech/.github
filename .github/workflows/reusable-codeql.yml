# Reusable CodeQL Analysis
# Called by each repo's pr-checks.yml
#
# Runs: CodeQL security and quality analysis
# Inputs: languages (JSON array), queries (query suite)
#
# For push/schedule scans, repos keep a standalone codeql.yml.
# This reusable workflow handles the PR-gated scan only.

name: CodeQL Analysis

on:
  workflow_call:
    inputs:
      languages:
        description: "JSON array of CodeQL languages, e.g. '[\"python\"]'"
        type: string
        required: true
      queries:
        description: "CodeQL query suite"
        type: string
        default: "security-and-quality"

jobs:
  codeql:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(inputs.languages) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: ${{ inputs.queries }}
          config: |
            paths-ignore:
              - .github

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
